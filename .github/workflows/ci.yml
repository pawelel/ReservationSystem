name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "YourStrong!Pass123"
        ports:
          - 1433:1433

    env:
      TEST_CONNECTION_STRING: "Server=localhost,1433;Database=ReservationSystem_Test;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True;"

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            if docker exec $(docker ps -qf "ancestor=mcr.microsoft.com/mssql/server:2022-latest") \
                 /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Pass123" -C -Q "SELECT 1" >/dev/null 2>&1; then
              echo "SQL Server is ready"
              exit 0
            fi
            echo "Waiting for SQL Server... ($i/30)"
            sleep 2
          done
          echo "SQL Server did not become ready in time" >&2
          exit 1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: "**/TestResults/*.trx"
